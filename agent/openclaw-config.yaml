# OpenClaw agent configuration — Grounded Answer Desk
# Docs: https://www.npmjs.com/package/openclaw

agent:
  name: grounded-answer-desk
  version: "1.0.0"

  # LLM backend: Google Gemini 2.5 Flash via Google AI Studio
  # Auth is configured on the VPS via: openclaw models auth paste-api-key --provider google
  llm:
    model: google/gemini-2.5-flash
    temperature: 0.1
    max_tokens: 1024

  # MCP server the agent retrieves through (the only path to the knowledge base)
  mcp_servers:
    - name: grounded-answer-desk-kb
      transport: sse
      url: ${MCP_URL:-http://127.0.0.1:8001/sse}

  # Tool selection strategy
  tool_choice: auto

  # Agent loop config
  loop:
    max_iterations: 6
    early_stop_on_answer: true
